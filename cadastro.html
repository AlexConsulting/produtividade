<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtividade (Firebase)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .cadastro-header { background-color: #007bff; color: white; padding: 20px 0; margin-bottom: 30px; }
        .form-container { 
            background-color: white; 
            padding: 30px; 
            border-radius: .5rem; 
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.1); 
        }
        .section-title { margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 20px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <header class="cadastro-header">
        <div class="container">
            <h1 class="text-center">Formulário de Cadastro de Produtividade</h1>
            <p class="text-center">Salvando dados diretamente no banco de dados</p>
            
            <div class="text-center mt-3">
                <a href="index.html" class="btn btn-sm btn-light">
                    &larr; Voltar à Página Inicial
                </a>
            </div>
            
        </div>
    </header>

    <main class="container">
        <div id="statusMessage" class="alert text-center" role="alert" style="display:none;"></div>

        <div class="form-container">
            <form id="cadastroForm">
                
                <h4 class="section-title">Informações Básicas:</h4>
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Data do plantão:</label>
                        <input type="date" class="form-control" name="Data do plantão:" required>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label">Turno:</label>
                        <select class="form-select" name="Diurno ou noturno:" required>
                            <option value="">Selecione...</option>
                            <option value="DIURNO">DIURNO</option>
                            <option value="INTERMEDIARIO">INTERMEDIARIO</option>
                            <option value="NOTURNO">NOTURNO</option>
                        </select>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label">Dia da semana:</label>
                        <input type="text" class="form-control" name="Dia da semana:" placeholder="Ex: SEGUNDA-FEIRA" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Nome completo do médico (MAIÚSCULO):</label>
                        <input type="text" class="form-control" name="Nome do médico" placeholder="NOME COMPLETO" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Consultório:</label>
                        <input type="text" class="form-control" name="Consultorio" placeholder="Ex: C1">
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Cliente:</label>
                        <input type="text" class="form-control" name="Cliente" list="listaClientes" required>
                        <datalist id="listaClientes"></datalist>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Unidade:</label>
                        <input type="text" class="form-control" name="Unidade" list="listaUnidades" required>
                        <datalist id="listaUnidades"></datalist>
                    </div>
                </div>


                <h4 class="section-title">Atendimentos e Totais:</h4>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Número de Novos atendimentos:</label>
                        <input type="number" class="form-control" id="Novos_Atendimentos" name="Número de Novos atendimentos:" value="0" min="0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Número de Reavaliações:</label>
                        <input type="number" class="form-control" id="Numero_Reavalicoes" name="Número Reavalições" value="0" min="0" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Total Geral:</label>
                        <input type="number" class="form-control" id="Total_atendimentos_completo" value="0" min="0" required readonly style="background-color: #e9ecef;">
                    </div>
                </div>

                <h4 class="section-title">Classificação de Risco (Fichas):</h4>
                
                <div class="row mb-4">
                    <div class="col-md-2"><label class="form-label">Verdes</label><input type="number" class="form-control" name="Número de fichas verdes" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Amarelas</label><input type="number" class="form-control" name="Número de fichas amarelas" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Laranjas</label><input type="number" class="form-control" name="Número de fichas laranja" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Azuis</label><input type="number" class="form-control" name="Número de fichas azul" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Brancas</label><input type="number" class="form-control" name="Número de fichas brancas" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Vermelhas</label><input type="number" class="form-control" name="Número de fichas VERMELHO" value="0"></div>
                </div>

                <h4 class="section-title">Exames:</h4>
                
                <div class="row mb-4">
                    <div class="col-md-2"><label class="form-label">Ecocardiograma</label><input type="number" class="form-control" name="Número de ecocardiograma" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Eletrocardiograma</label><input type="number" class="form-control" name="Número de eletrocardiograma" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Laboratoriais</label><input type="number" class="form-control" name="Número de laboratoriais" value="0"></div>
                    <div class="col-md-2"><label class="form-label">RX</label><input type="number" class="form-control" name="Número de RX" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Tomografias</label><input type="number" class="form-control" name="Tomografias" value="0"></div>
                    <div class="col-md-2"><label class="form-label">USG</label><input type="number" class="form-control" name="USG" value="0"></div>
                </div>

                <h4 class="section-title">Medicações Prescritas:</h4>

                <div class="row mb-3">
                    <div class="col-md-2"><label class="form-label">EV</label><input type="number" class="form-control" name="Medicação prescritas EV" value="0"></div>
                    <div class="col-md-2"><label class="form-label">IM</label><input type="number" class="form-control" name="Medicação prescritas IM" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Subcutânea</label><input type="number" class="form-control" name="Medicação Subcultanea" value="0"></div> 
                    <div class="col-md-2"><label class="form-label">VO/Sublingual</label><input type="number" class="form-control" name="Medicação VO ou Subligual" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Oftálmica</label><input type="number" class="form-control" name="Medicação OFTALMICA" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Inalação</label><input type="number" class="form-control" name="INALAÇÃO" value="0"></div>
                </div>

                <div class="row mb-5">
                    <div class="col-md-2"><label class="form-label">Naso enteral</label><input type="number" class="form-control" name="NASO ENTERAL" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Retal</label><input type="number" class="form-control" name="RETAL" value="0"></div>
                    <div class="col-md-2"><label class="form-label">Tópico</label><input type="number" class="form-control" name="TOPICO" value="0"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100" id="saveButton">
                    Salvar Registro no Banco de Dados
                </button>

            </form>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_22plUsZfyzW909W1ePkCJxq-KdUydcw",
            authDomain: "produtividade-4d98e.firebaseapp.com",
            projectId: "produtividade-4d98e",
            storageBucket: "produtividade-4d98e.firebasestorage.app",
            messagingSenderId: "642824868640",
            appId: "1:642824868640:web:3e6ea0e09c41ec09023d45",
            measurementId: "G-489RSTNQVT"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const PRODUTIVIDADE_COLLECTION = 'produtividade'; 

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cadastroForm');
            const statusMessage = document.getElementById('statusMessage');
            const novosInput = document.getElementById('Novos_Atendimentos');
            const reavalInput = document.getElementById('Numero_Reavalicoes');
            const totalInput = document.getElementById('Total_atendimentos_completo');

            async function carregarSugestoes() {
                try {
                    const snapshot = await db.collection(PRODUTIVIDADE_COLLECTION).limit(500).get();
                    const clientesSet = new Set();
                    const unidadesSet = new Set();

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.Cliente) clientesSet.add(data.Cliente);
                        if (data.Unidade) unidadesSet.add(data.Unidade);
                    });

                    const datalistClientes = document.getElementById('listaClientes');
                    const datalistUnidades = document.getElementById('listaUnidades');

                    clientesSet.forEach(cliente => {
                        const option = document.createElement('option');
                        option.value = cliente;
                        datalistClientes.appendChild(option);
                    });

                    unidadesSet.forEach(unidade => {
                        const option = document.createElement('option');
                        option.value = unidade;
                        datalistUnidades.appendChild(option);
                    });
                } catch (error) {
                    console.error("Erro ao carregar sugestões:", error);
                }
            }
            carregarSugestoes();

            const updateSum = () => {
                const novos = Number(novosInput.value) || 0;
                const reaval = Number(reavalInput.value) || 0;
                totalInput.value = novos + reaval;
            };

            novosInput.addEventListener('input', updateSum);
            reavalInput.addEventListener('input', updateSum);

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btnSalvar = document.getElementById('saveButton');
                btnSalvar.disabled = true;

                const formData = new FormData(form);
                const dataToSave = {};
                
                formData.forEach((value, key) => {
                    const element = document.querySelector(`[name="${key}"]`);
                    
                    if (element && element.type === 'number') {
                        dataToSave[key] = Number(value) || 0;
                    } else {
                        // Trata o nome do médico para sempre ser salvo em maiúsculo
                        if (key === 'Nome do médico') {
                             dataToSave[key] = String(value).toUpperCase().trim();
                        } else {
                            dataToSave[key] = value;
                        }
                    }
                });

                // CHAVES ESPECÍFICAS PARA GARANTIR COMPATIBILIDADE COM O DASHBOARD E BANCO
                dataToSave["Carimbo de data/hora"] = new Date().toISOString(); 
                dataToSave["Total de atendimento novos atendimentos e reavalicões:"] = Number(totalInput.value);

                statusMessage.style.display = 'block';
                statusMessage.className = 'alert alert-info';
                statusMessage.textContent = 'Enviando dados para o Firebase...';

                try {
                    const docRef = await db.collection(PRODUTIVIDADE_COLLECTION).add(dataToSave);
                    statusMessage.className = 'alert alert-success';
                    statusMessage.textContent = `Sucesso! Registro salvo no DB com ID: ${docRef.id}`;
                    form.reset();
                    updateSum(); 

                } catch (error) {
                    statusMessage.className = 'alert alert-danger';
                    statusMessage.textContent = `Erro ao salvar no Firebase: ${error.message}`; 
                } finally {
                    btnSalvar.disabled = false;
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
